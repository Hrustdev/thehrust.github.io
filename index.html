<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Countdown</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
padding:20px;
font-family:Arial, sans-serif;
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.container{
text-align:center;
width:100%;
max-width:500px;
}

.title{
font-size:clamp(26px,6vw,40px);
margin-bottom:30px;
}

.timer{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
}

.time-box{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:12px;
backdrop-filter: blur(10px);
min-width:90px;
flex:1;
}

.number{
font-size:clamp(32px,8vw,48px);
font-weight:bold;
}

.label{
margin-top:6px;
font-size:14px;
opacity:0.8;
}

@media (max-width:480px){

.timer{
gap:10px;
}

.time-box{
padding:16px;
min-width:70px;
}

.label{
font-size:12px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="timer">

<div class="time-box">
<div id="hours" class="number">00</div>
<div class="label">Hours</div>
</div>

<div class="time-box">
<div id="minutes" class="number">00</div>
<div class="label">Minutes</div>
</div>

<div class="time-box">
<div id="seconds" class="number">00</div>
<div class="label">Seconds</div>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
